<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Copa Tabuada CEIB 2026 - V2 Oficial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0a0f1e;
            color: #eee;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card {
            background: rgba(12,20,35,0.9);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(0,255,255,0.2);
        }
        .hidden { display: none; }
        h1, h2, h3 { color: #ffd966; margin-bottom: 16px; }
        button {
            background: #1f3a4b;
            color: #fff;
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin: 4px;
        }
        button:hover { background: #2c5a6e; transform: scale(1.02); }
        button:disabled { background: #333; cursor: not-allowed; opacity: 0.5; }
        .btn-primary { background: #e67e22; }
        .btn-success { background: #27ae60; }
        .btn-danger { background: #c0392b; }
        .btn-warning { background: #f39c12; }
        .status-box {
            background: #000000aa;
            border-radius: 20px;
            padding: 16px;
            margin-top: 20px;
            overflow-x: auto;
        }
        .flex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .timer-display {
            font-size: 32px;
            font-weight: bold;
            color: #ffd966;
            background: #000;
            padding: 10px 20px;
            border-radius: 15px;
            display: inline-block;
        }
        .online-badge {
            background: #27ae60;
            color: white;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 14px;
        }
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        .ranking-table th, .ranking-table td {
            border-bottom: 1px solid #2c3e50;
            padding: 12px;
            text-align: left;
        }
        .classificado-sim { color: #2ecc71; font-weight: bold; }
        .classificado-nao { color: #e74c3c; font-weight: bold; }
        .barra-tempo {
            width: 100%;
            height: 12px;
            background: #2c3e50;
            border-radius: 6px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progresso-tempo {
            width: 100%;
            height: 100%;
            background: #27ae60;
            transition: width 0.1s linear;
        }
        .opcoes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .opcao {
            background: #1f3a4b;
            color: white;
            padding: 15px;
            font-size: 20px;
            border-radius: 40px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #e67e22;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 3000;
            font-weight: bold;
        }
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<div class="container">
    <div class="card">
        <h1>🏆 COPA TABUADA CEIB 2026</h1>
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <div>
                <p>Fase atual: <strong id="fase-atual-titulo">--</strong></p>
                <div id="timer-fase" class="timer-display">00:00</div>
                <div style="font-size: 12px; margin-top: 5px;">Última Sinc: <span id="last-sync-time">--</span></div>
                <button id="btn-sincronizar" class="btn-small" style="margin-top: 5px;">🔄 Sincronizar</button>
            </div>
            <div id="online-stats" class="online-badge hidden">Online: <span id="jogadores-online">0</span></div>
        </div>
        <div style="display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0;">
            <button id="btn-professor" class="btn-primary">👨‍🏫 Professor</button>
            <button id="btn-aluno">🎮 Aluno</button>
            <button id="btn-projecao">📺 Torcida</button>
            <a href="https://henriqueprofessor.github.io/Tabuada/" target="_blank" class="btn-primary" style="text-decoration: none;">🔗 Fase Classificatória</a>
        </div>
    </div>

    <!-- PAINEL DO PROFESSOR -->
    <div id="painel-professor" class="card hidden">
        <h2>🔧 Painel do Professor</h2>
        <div class="flex-grid">
            <div>
                <h3>Controle da Fase</h3>
                <div class="status-box" style="margin-top:0">
                    <label>Tempo (minutos):</label>
                    <input type="number" id="input-tempo-fase" value="12" min="1" style="width: 60px; padding: 5px; border-radius: 5px;">
                    <button id="btn-salvar-tempo" class="btn-warning" style="padding: 5px 10px;">💾</button>
                    <hr style="margin: 10px 0; border: 0; border-top: 1px solid #444;">
                    <button id="btn-iniciar-fase" class="btn-success">▶️ Iniciar</button>
                    <button id="btn-parar-fase" class="btn-danger">⏹️ Parar</button>
                </div>
                <button id="btn-avancar-fase" class="btn-primary" style="margin-top: 10px; width: 100%;">➡️ Finalizar e Classificar Top 30</button>
                <button id="btn-reset-total" class="btn-danger" style="margin-top: 10px; width: 100%;">⚠️ Resetar Competição</button>
            </div>
            <div>
                <h3>Jogadores Online: <span id="prof-online-count">0</span></h3>
                <div id="lista-participantes" style="max-height: 180px; overflow-y: auto; background: #000; padding: 10px; border-radius: 10px;"></div>
            </div>
        </div>
        <h3>Ranking da Fase</h3>
        <div id="ranking-parcial" class="status-box"></div>
    </div>

    <!-- TELA DO ALUNO -->
    <div id="tela-aluno" class="card hidden">
        <h2 id="aluno-nome-display">Aluno</h2>
        <p>Turma: <span id="aluno-turma-display">-</span></p>

        <div id="jogo-area" class="hidden">
            <div class="status-box">
                <div class="barra-tempo"><div id="progresso-tempo" class="progresso-tempo"></div></div>
                <div id="pergunta" style="font-size:48px; text-align:center; margin: 20px 0;">0 x 0 = ?</div>
                <div class="opcoes-grid">
                    <button class="opcao" onclick="responder(0)"></button>
                    <button class="opcao" onclick="responder(1)"></button>
                    <button class="opcao" onclick="responder(2)"></button>
                    <button class="opcao" onclick="responder(3)"></button>
                </div>
                <div style="text-align: center;">Pergunta: <span id="pergunta-num">1</span>/20</div>
            </div>
        </div>

        <div id="aguardando-aluno" style="text-align:center; padding:20px;">
            <div id="msg-status-aluno">Aguardando...</div>
            <button id="btn-iniciar-partida" class="btn-success hidden" style="font-size: 24px; padding: 20px 40px; margin-top: 20px;">🎮 JOGAR</button>
        </div>

        <div class="status-box">
            <h3>Seu Melhor Resultado: <span id="aluno-melhor-score">0</span></h3>
            <div id="historico-aluno"></div>
        </div>
        <button id="btn-sair-aluno" style="margin-top: 20px;">⬅️ Sair</button>
    </div>

    <!-- TELA DE TORCIDA -->
    <div id="tela-torcida" class="card hidden">
        <h2>📺 RANKING EM TEMPO REAL</h2>
        <div id="ranking-torcida-container" class="status-box"></div>
        <button id="btn-sair-torcida" style="margin-top: 20px;">⬅️ Voltar</button>
    </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAA_5rBa-eQ4611y3Kg8B-VBz0-o2HVhEE",
        authDomain: "final-copa-tabuada.firebaseapp.com",
        databaseURL: "https://final-copa-tabuada-default-rtdb.firebaseio.com",
        projectId: "final-copa-tabuada",
        storageBucket: "final-copa-tabuada.firebasestorage.app",
        messagingSenderId: "488825824115",
        appId: "1:488825824115:web:50e94f68253473aee91b06"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let meuTipo = null, alunoId = null, alunoNome = null, alunoTurma = null;
    let estadoAtual = null, jogoAtivo = false;
    let perguntas = [], perguntaIdx = 0, pontosPartida = 0, acertosPartida = 0, tempoTotalPartida = 0;
    let timerPergunta = null, tempoRestantePergunta = 10, timerFase = null;

    async function init() {
        db.ref('copaV2').on('value', snap => {
            estadoAtual = snap.val() || { fase: 1, status: 'aguardando', tempoFase: 12, fim: 0, classificados: {} };
            atualizarUI();
        });

        // Online Tracking
        db.ref('.info/connected').on('value', snap => {
            if (snap.val() === true && alunoId) {
                const ref = db.ref(`online/${alunoId}`);
                ref.onDisconnect().remove();
                ref.set({ nome: alunoNome, turma: alunoTurma });
            }
        });

        db.ref('online').on('value', snap => {
            const count = snap.numChildren();
            document.getElementById('jogadores-online').innerText = count;
            document.getElementById('prof-online-count').innerText = count;
            if (meuTipo === 'professor') {
                let html = '<ul>';
                snap.forEach(c => html += `<li>🟢 ${c.val().nome} (${c.val().turma})</li>`);
                document.getElementById('lista-participantes').innerHTML = html + '</ul>';
            }
        });
    }

    function atualizarUI() {
        updateLastSyncTime();
        document.getElementById('fase-atual-titulo').innerText = estadoAtual.fase;
        
        if (estadoAtual.status === 'em_andamento') {
            if (timerFase) clearInterval(timerFase);
            timerFase = setInterval(() => {
                const restante = Math.max(0, estadoAtual.fim - Date.now());
                if (restante <= 0) {
                    clearInterval(timerFase);
                    document.getElementById('timer-fase').innerText = "ENCERRADO";
                } else {
                    const min = Math.floor(restante / 60000);
                    const sec = Math.floor((restante % 60000) / 1000);
                    document.getElementById('timer-fase').innerText = `${min}:${sec.toString().padStart(2,'0')}`;
                }
            }, 1000);
        } else {
            document.getElementById('timer-fase').innerText = "PAUSADO";
        }

        if (meuTipo === 'professor') renderRanking('ranking-parcial');
        else if (meuTipo === 'aluno') renderAluno();
        else if (meuTipo === 'projecao') renderRanking('ranking-torcida-container');
    }

    function renderRanking(containerId) {
        const resultados = estadoAtual.resultados?.[estadoAtual.fase] || {};
        const participantes = estadoAtual.participantes?.[estadoAtual.fase] || {};
        let lista = [];
        
        for (let id in resultados) {
            const p = resultados[id];
            const melhor = [...p].sort((a,b) => b.pontos - a.pontos)[0];
            lista.push({ id, nome: participantes[id]?.nome, turma: participantes[id]?.turma, melhor: melhor.pontos, acertos: melhor.acertos, tempo: melhor.tempo });
        }

        // Critérios de desempate: Pontos > Acertos > Menor Tempo
        lista.sort((a,b) => b.melhor - a.melhor || b.acertos - a.acertos || a.tempo - b.tempo);

        let html = '<table class="ranking-table"><tr><th>Pos</th><th>Nome</th><th>Turma</th><th>Melhor Pontuação</th><th>Status</th></tr>';
        lista.forEach((r, i) => {
            const classificado = i < 30;
            html += `<tr><td>${i+1}º</td><td>${r.nome}</td><td>${r.turma}</td><td>${r.melhor}</td><td class="${classificado ? 'classificado-sim' : 'classificado-nao'}">${classificado ? '✅ Classificado' : '❌ Eliminado'}</td></tr>`;
        });
        document.getElementById(containerId).innerHTML = html + '</table>';
    }

    function renderAluno() {
        const agora = Date.now();
        const encerrado = agora >= estadoAtual.fim;
        const liberado = estadoAtual.status === 'em_andamento';
        
        document.getElementById('aluno-nome-display').innerText = alunoNome;
        document.getElementById('aluno-turma-display').innerText = alunoTurma;

        if (!liberado) {
            document.getElementById('msg-status-aluno').innerText = "Aguardando liberação do professor...";
            document.getElementById('btn-iniciar-partida').classList.add('hidden');
        } else if (encerrado) {
            document.getElementById('msg-status-aluno').innerText = "Tempo esgotado! Não é possível abrir novas partidas.";
            document.getElementById('btn-iniciar-partida').classList.add('hidden');
        } else {
            document.getElementById('msg-status-aluno').innerText = "Fase liberada! Jogue para garantir sua vaga.";
            document.getElementById('btn-iniciar-partida').classList.remove('hidden');
        }

        const minhasPartidas = estadoAtual.resultados?.[estadoAtual.fase]?.[alunoId] || [];
        const melhor = minhasPartidas.length > 0 ? Math.max(...minhasPartidas.map(p => p.pontos)) : 0;
        document.getElementById('aluno-melhor-score').innerText = melhor;
    }

    // Ações Aluno
    document.getElementById('btn-aluno').onclick = async () => {
        const nome = prompt("Seu nome completo:");
        if (!nome) return;
        alunoNome = nome.trim();
        alunoTurma = prompt("Sua turma (ex: 901):");
        if (!alunoTurma) return;
        alunoId = btoa(alunoNome.toLowerCase() + "|" + alunoTurma).slice(0,16);

        if (estadoAtual.fase > 1) {
            const classificadosAnterior = estadoAtual.classificados?.[estadoAtual.fase - 1] || [];
            if (!classificadosAnterior.includes(alunoId)) {
                alert("Você não se classificou para esta fase.");
                return;
            }
        }

        meuTipo = 'aluno';
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById('tela-aluno').classList.remove('hidden');
        document.getElementById('online-stats').classList.remove('hidden');
        
        db.ref(`copaV2/participantes/${estadoAtual.fase}/${alunoId}`).set({ nome: alunoNome, turma: alunoTurma });
        db.ref(`online/${alunoId}`).set({ nome: alunoNome, turma: alunoTurma });
    };

    document.getElementById('btn-iniciar-partida').onclick = () => {
        if (jogoAtivo) return;
        perguntas = gerarPerguntas();
        perguntaIdx = 0; pontosPartida = 0; acertosPartida = 0; tempoTotalPartida = 0;
        jogoAtivo = true;
        document.getElementById('jogo-area').classList.remove('hidden');
        document.getElementById('aguardando-aluno').classList.add('hidden');
        proxima();
    };

    function proxima() {
        if (perguntaIdx >= 20) { finalizar(); return; }
        const p = perguntas[perguntaIdx];
        document.getElementById('pergunta').innerText = `${p.a} x ${p.b} = ?`;
        const btns = document.querySelectorAll('.opcao');
        p.opts.forEach((o, i) => { btns[i].innerText = o; btns[i].disabled = false; });
        document.getElementById('pergunta-num').innerText = perguntaIdx + 1;
        startTimer();
    }

    function startTimer() {
        tempoRestantePergunta = 10;
        const barra = document.getElementById('progresso-tempo');
        if (timerPergunta) clearInterval(timerPergunta);
        timerPergunta = setInterval(() => {
            tempoRestantePergunta -= 0.1;
            barra.style.width = (tempoRestantePergunta * 10) + '%';
            if (tempoRestantePergunta <= 0) responder(-1);
        }, 100);
    }

    function responder(idx) {
        clearInterval(timerPergunta);
        const tempoGasto = 10 - tempoRestantePergunta;
        tempoTotalPartida += tempoGasto;
        
        if (idx !== -1) {
            const resp = parseInt(document.querySelectorAll('.opcao')[idx].innerText);
            const p = perguntas[perguntaIdx];
            if (resp === p.a * p.b) {
                acertosPartida++;
                pontosPartida += Math.round(100 * (tempoRestantePergunta / 10));
            }
        }
        perguntaIdx++;
        setTimeout(proxima, 200);
    }

    async function finalizar() {
        jogoAtivo = false;
        document.getElementById('jogo-area').classList.add('hidden');
        document.getElementById('aguardando-aluno').classList.remove('hidden');
        
        const ref = db.ref(`copaV2/resultados/${estadoAtual.fase}/${alunoId}`);
        const snap = await ref.once('value');
        const lista = snap.val() || [];
        lista.push({ pontos: pontosPartida, acertos: acertosPartida, tempo: tempoTotalPartida });
        await ref.set(lista);
        toast(`Fim! Pontos: ${pontosPartida}`);
        confete();
    }

    // Ações Professor
    document.getElementById('btn-professor').onclick = () => {
        if (prompt("Senha:") === "040199") {
            meuTipo = 'professor';
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById('painel-professor').classList.remove('hidden');
            document.getElementById('online-stats').classList.remove('hidden');
        }
    };

    document.getElementById('btn-salvar-tempo').onclick = () => {
        const t = parseInt(document.getElementById('input-tempo-fase').value);
        db.ref('copaV2/tempoFase').set(t);
        toast("Tempo salvo!");
    };

    document.getElementById('btn-iniciar-fase').onclick = () => {
        const fim = Date.now() + (estadoAtual.tempoFase * 60000);
        db.ref('copaV2').update({ status: 'em_andamento', fim: fim });
    };

    document.getElementById('btn-parar-fase').onclick = () => db.ref('copaV2/status').set('pausado');

    document.getElementById('btn-avancar-fase').onclick = async () => {
        if (!confirm("Classificar Top 30 e avançar?")) return;
        const res = estadoAtual.resultados?.[estadoAtual.fase] || {};
        let lista = [];
        for (let id in res) {
            const p = res[id];
            const melhor = [...p].sort((a,b) => b.pontos - a.pontos)[0];
            lista.push({ id, pts: melhor.pontos, ac: melhor.acertos, tm: melhor.tempo });
        }
        lista.sort((a,b) => b.pts - a.pts || b.ac - a.ac || a.tm - b.tm);
        const classificados = lista.slice(0, 30).map(l => l.id);
        
        await db.ref(`copaV2/classificados/${estadoAtual.fase}`).set(classificados);
        await db.ref('copaV2').update({ fase: estadoAtual.fase + 1, status: 'aguardando', fim: 0 });
        toast("Próxima fase liberada!");
    };

    document.getElementById('btn-reset-total').onclick = () => {
        if (confirm("RESET TOTAL?")) {
            db.ref('copaV2').set({ fase: 1, status: 'aguardando', tempoFase: 12, fim: 0 });
            db.ref('online').remove();
            location.reload();
        }
    };

    // Utils
    function gerarPerguntas() {
        let p = [];
        for(let i=0; i<20; i++) {
            let a = Math.floor(Math.random()*11), b = Math.floor(Math.random()*11), r = a*b;
            let o = [r];
            while(o.length<4) {
                let x = r + Math.floor(Math.random()*11)-5;
                if(x>=0 && !o.includes(x)) o.push(x);
            }
            p.push({ a, b, opts: o.sort((x,y)=>x-y) });
        }
        return p;
    }

    function toast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.classList.remove('hidden');
        setTimeout(() => t.classList.add('hidden'), 3000);
    }

    function confete() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let p = [];
        for(let i=0; i<100; i++) p.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*4+2, c:`hsl(${Math.random()*360},70%,50%)`, vx:Math.random()*4-2, vy:Math.random()*4-2, a:1});
        function d() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let active = false;
            p.forEach(part => {
                if (part.a > 0) {
                    active = true;
                    part.x += part.vx; part.y += part.vy; part.a -= 0.01;
                    ctx.globalAlpha = part.a; ctx.fillStyle = part.c;
                    ctx.beginPath(); ctx.arc(part.x, part.y, part.r, 0, Math.PI*2); ctx.fill();
                }
            });
            if (active) requestAnimationFrame(d);
        }
        d();
    }

    document.getElementById('btn-projecao').onclick = () => {
        meuTipo = 'projecao';
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById('tela-torcida').classList.remove('hidden');
    };

    document.getElementById('btn-sair-aluno').onclick = () => location.reload();
    document.getElementById('btn-sair-torcida').onclick = () => location.reload();

    document.getElementById('btn-sincronizar').onclick = () => {
        updateLastSyncTime();
        toast('Sincronizado!');
    };

    function updateLastSyncTime() {
        const now = new Date();
        const timeString = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const dateString = now.toLocaleDateString('pt-BR');
        document.getElementById('last-sync-time').innerText = `${dateString} ${timeString}`;
    }

    init();
</script>
</body>
</html>
