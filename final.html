    <!-- CONTROLE DE VERSÃO -->
    <!-- ============================================================ -->
    <script>
        (function() {
            if (!window.location.search.includes('v=')) {
                const timestamp = Date.now();
                const separator = window.location.search ? '&' : '?';
                const newUrl = window.location.href + separator + 'v=' + timestamp;
                window.location.replace(newUrl);
                return;
            }

            window.verificarVersao = async function(mostrarToast = true) {
                try {
                    const response = await fetch('version.json?v=' + Date.now());
                    if (!response.ok) {
                        if (mostrarToast) toast('⚠️ version.json não encontrado.');
                        return;
                    }
                    const data = await response.json();
                    const versaoSalva = localStorage.getItem('versao_jogo');

                    if (versaoSalva && versaoSalva !== data.version) {
                        const confirmar = confirm(
                            '🔄 NOVA VERSÃO DISPONÍVEL!\n\n' +
                            'Versão atual: ' + versaoSalva + '\n' +
                            'Nova versão: ' + data.version + '\n' +
                            'Data: ' + data.updateDate + '\n\n' +
                            'Novidades:\n' + data.message + '\n\n' +
                            'Deseja recarregar para atualizar?'
                        );
                        if (confirmar) {
                            localStorage.setItem('versao_jogo', data.version);
                            window.location.reload();
                        }
                    } else if (!versaoSalva) {
                        localStorage.setItem('versao_jogo', data.version);
                        if (mostrarToast) toast('✅ Versão ' + data.version + ' salva!');
                    } else {
                        if (mostrarToast) toast('✅ Jogo atualizado! (v' + data.version + ')');
                    }
                    return data;
                } catch (e) {
                    if (mostrarToast) toast('⚠️ Erro ao verificar versão.');
                    return null;
                }
            };

            setTimeout(() => window.verificarVersao(false), 2000);
            console.log('✅ Controle de versão ativado!');
        })();
    </script>
