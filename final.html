<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando...</title>
    <meta http-equiv="refresh" content="0; url=./">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0f1e;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #ffd966;
            max-width: 500px;
        }
        .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 5px solid #2c3e50;
            border-top-color: #ffd966;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 { color: #ffd966; }
        p { color: #94a3b8; }
        a { color: #4ade80; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>🔄 Atualizando para a nova versão...</h1>
        <p>Você será redirecionado automaticamente em instantes.</p>
        <p>Se não funcionar, <a href="./">clique aqui para acessar</a>.</p>
    </div>
    <script>
        window.location.replace('./');
    </script>
</body>
</html>
